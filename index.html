<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 936 Training - PGAS Solution</title>
    <!-- Standar CDN yang stabil -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Cinzel:wght@700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            background-color: #f8fafc;
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Istilah Asing (Satu-satunya yang miring) */
        .foreign { 
            font-style: italic; 
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Print Specific Styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #certificate-print-area, #certificate-print-area * {
                visibility: visible;
            }
            #certificate-print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 0;
                background: white !important;
            }
            .no-print {
                display: none !important;
            }
        }

        .cert-border {
            border: 15px solid #f1f5f9;
            outline: 2px solid #C5A059;
            outline-offset: -8px;
        }

        .cinzel { font-family: 'Cinzel', serif; }

        /* Premium UI Elements - Proportional Scaling */
        .premium-card {
            transition: all 0.3s ease;
            background: white;
            border: 1px solid #e2e8f0;
        }
        .premium-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.05);
            border-color: #cbd5e1;
        }

        .btn-hover {
            transition: all 0.2s ease;
        }
        .btn-hover:active {
            transform: scale(0.98);
        }

        [data-lucide] {
            display: inline-block;
        }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const LucideIcon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                const render = () => {
                    if (iconRef.current && window.lucide) {
                        iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                        window.lucide.createIcons({
                            attrs: {
                                width: size,
                                height: size,
                                class: className,
                                'stroke-width': 2.2
                            }
                        });
                    }
                };
                render();
                const timeout = setTimeout(render, 50);
                return () => clearTimeout(timeout);
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedModule, setSelectedModule] = useState(null);
            
            // Progress State
            const [viewedModules, setViewedModules] = useState([]);
            const [bestSimScore, setBestSimScore] = useState(0);
            const [bestExamScore, setBestExamScore] = useState(0);

            // Simulation State
            const [simulationStep, setSimulationStep] = useState(0);
            const [score, setScore] = useState(0);
            const [showResult, setShowResult] = useState(false);
            const [activeSimQuestions, setActiveSimQuestions] = useState([]);
            
            // Exam State
            const [examStarted, setExamStarted] = useState(false);
            const [examSelectionMode, setExamSelectionMode] = useState(true);
            const [currentExamQuestion, setCurrentExamQuestion] = useState(0);
            const [examScore, setExamScore] = useState(0);
            const [examFinished, setExamFinished] = useState(false);
            const [activeExamQuestions, setActiveExamQuestions] = useState([]);
            const [showCertificate, setShowCertificate] = useState(false);

            const theoryModules = [
                {
                    id: 'mat_class',
                    title: "Klasifikasi Material & Properti",
                    shortDesc: "Detail teknis klasifikasi refractory (ASTM C155) dan pemilihan material.",
                    image: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=800",
                    icon: "layers",
                    fullContent: `
                        <div class="space-y-4">
                            <h4 class="text-xl font-bold text-slate-900 uppercase">1. Klasifikasi Material <span class="foreign">Refractory</span></h4>
                            <p class="text-base">Berdasarkan <strong>API 936</strong> dan <strong>ASTM C155</strong>, material monolitik diklasifikasikan menjadi:</p>
                            <ul class="list-disc pl-5 space-y-1 text-base">
                                <li><strong><span class="foreign">Conventional Castable</span>:</strong> Mengandung semen alumina tinggi > 15%.</li>
                                <li><strong><span class="foreign">Low Cement Castable (LCC)</span>:</strong> Kandungan semen 3% - 8%. Memiliki kekuatan tinggi dan porositas rendah.</li>
                                <li><strong><span class="foreign">Insulating Castable</span>:</strong> Densitas rendah (< 1.6 g/cm³), konduktivitas termal rendah, cocok sebagai <span class="foreign">backing layer</span>.</li>
                            </ul>
                            <h4 class="text-xl font-bold text-slate-900 mt-6 uppercase">2. Persyaratan Penyimpanan (<span class="foreign">Storage</span>)</h4>
                            <p class="text-base">Material <span class="foreign">refractory</span> sangat sensitif terhadap kelembaban. Standar penyimpanan meliputi:</p>
                            <ul class="list-disc pl-5 space-y-1 text-base">
                                <li>Disimpan di tempat tertutup, berventilasi, dan di atas palet kayu (<span class="foreign">off the ground</span>).</li>
                                <li>Masa kedaluwarsa (<span class="foreign">Shelf Life</span>) harus dipantau. Material yang menggumpal (<span class="foreign">lumps</span>) tidak boleh digunakan.</li>
                            </ul>
                        </div>
                    `
                },
                {
                    id: 'inst_proc',
                    title: "Prosedur Instalasi (Casting & Gunning)",
                    shortDesc: "Metodologi pemasangan, kontrol air, dan teknik vibrasi standar API.",
                    image: "https://images.unsplash.com/photo-1581092160607-ee22621dd758?auto=format&fit=crop&q=80&w=800",
                    icon: "zap",
                    fullContent: `
                        <div class="space-y-4">
                            <h4 class="text-xl font-bold text-slate-900 uppercase">Teknik Instalasi <span class="foreign">Refractory</span></h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="p-4 border border-slate-200 rounded-xl bg-slate-50">
                                    <h5 class="font-bold text-blue-700 mb-1 uppercase text-sm"><span class="foreign">Vibration Casting</span></h5>
                                    <p class="text-sm">Kontrol rasio air sangat krusial. <span class="foreign">Vibrator</span> digunakan untuk menghilangkan <span class="foreign">void</span> tanpa menyebabkan segregasi material.</p>
                                </div>
                                <div class="p-4 border border-slate-200 rounded-xl bg-slate-50">
                                    <h5 class="font-bold text-orange-700 mb-1 uppercase text-sm"><span class="foreign">Gunning (Pneumatic)</span></h5>
                                    <p class="text-sm">Material disemprotkan menggunakan udara bertekanan. <span class="foreign">Rebound</span> tidak boleh dikumpulkan dan dipakai ulang.</p>
                                </div>
                            </div>
                        </div>
                    `
                },
                {
                    id: 'insp_qc',
                    title: "Inspeksi & Quality Control",
                    shortDesc: "Kriteria penerimaan visual, hammer test, dan pengambilan sampel lab.",
                    image: "https://images.unsplash.com/photo-1504307651254-35680fb3ba66?auto=format&fit=crop&q=80&w=800",
                    icon: "shield-check",
                    fullContent: `
                        <div class="space-y-4">
                            <h4 class="text-xl font-bold text-slate-900 uppercase">Protokol Inspeksi API 936</h4>
                            <p class="text-base">Inspektur wajib melakukan verifikasi pada setiap tahapan:</p>
                            <div class="space-y-2">
                                <p class="text-base">1. <strong><span class="foreign">Visual Inspection</span>:</strong> Memastikan tidak ada retakan tembus (<span class="foreign">structural cracks</span>), <span class="foreign">spalling</span>, atau delaminasi.</p>
                                <p class="text-base">2. <strong><span class="foreign">Hammer Test</span>:</strong> Menggunakan palu 16-oz. Suara denting menunjukkan kepadatan yang baik.</p>
                            </div>
                            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm">
                                <strong>Catatan Teknis:</strong> Retakan permukaan (<span class="foreign">hairline cracks</span>) < 1.6 mm dianggap normal.
                            </div>
                        </div>
                    `
                },
                {
                    id: 'post_inst',
                    title: "Curing & Dry-Out Schedule",
                    shortDesc: "Manajemen pelepasan air kristal dan pencegahan steam explosion.",
                    image: "https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&q=80&w=800",
                    icon: "thermometer",
                    fullContent: `
                        <div class="space-y-4">
                            <h4 class="text-xl font-bold text-slate-900 uppercase"><span class="foreign">Curing & Dry-Out</span></h4>
                            <p class="text-base">Setelah instalasi, material memerlukan waktu <strong><span class="foreign">Curing</span></strong> (biasanya 24 jam).</p>
                            <h4 class="text-xl font-bold text-slate-900 mt-4 uppercase">Prosedur <span class="foreign">Dry-out</span></h4>
                            <p class="text-base">Proses pemanasan terkendali. Mengabaikan <span class="foreign">ramp rate</span> dapat menyebabkan <strong><span class="foreign">Steam Explosion</span></strong>.</p>
                        </div>
                    `
                }
            ];

            const INSPECTION_DATABASE = [
                { id: 1, title: "PENGECEKAN ANCHOR", description: "Pengecekan pola penjangkaran pada shell furnace.", image: "https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=400", question: "Berapa jarak minimum tip anchor ke permukaan panas (hot face) yang umum?", options: ["12mm - 25mm", "5mm - 10mm", "50mm", "tanpa jarak"], correct: 0 },
                { id: 2, title: "PEMERIKSAAN SUARA (HAMMER TEST)", description: "Melakukan pengetukan pada lining castable yang sudah curing.", image: "https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&q=80&w=400", question: "Suara 'dull' (teredam) saat hammer test mengindikasikan apa?", options: ["material padat sempurna", "adanya void atau delaminasi", "kandungan air pas", "suhu shell terlalu tinggi"], correct: 1 },
                { id: 3, title: "PENGENDALIAN REBOUND GUNNING", description: "Instalasi refractory dengan metode pneumatic gunning.", image: "https://images.unsplash.com/photo-1533038595220-3b96b20ed8c1?auto=format&fit=crop&q=80&w=400", question: "Menurut API 936, apa yang harus dilakukan terhadap material rebound?", options: ["dicampur kembali untuk penghematan", "dibuang dan tidak boleh digunakan lagi", "disemprotkan kembali ke sela-sela anchor", "hanya boleh digunakan sebagai backing layer"], correct: 1 },
                { id: 4, title: "KUALITAS AIR PENCAMPUR", description: "Persiapan mixing material castable di lapangan.", image: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=400", question: "Air seperti apa yang diizinkan untuk mencampur castable?", options: ["air laut", "air limbah industri yang sudah difilter", "air tawar bersih/layak minum (potable)", "air dengan kandungan alkali tinggi"], correct: 2 },
                { id: 5, title: "IDENTIFIKASI RETAKAN", description: "Ditemukan retakan pada permukaan lining setelah curing.", image: "https://images.unsplash.com/photo-1581092160607-ee22621dd758?auto=format&fit=crop&q=80&w=400", question: "Retakan (crack) dengan lebar berapa yang dianggap kritis menurut API 936?", options: ["hairline crack (< 0.5 mm)", "hanya retakan yang lebih besar dari 1.6 mm", "semua jenis retakan harus ditambal", "hanya jika retakan berwarna hitam"], correct: 1 },
                { id: 6, title: "JARAK NOZZLE GUNNING", description: "Aplikator sedang melakukan gunning pada dinding vertikal.", image: "https://images.unsplash.com/photo-1504307651254-35680fb3ba66?auto=format&fit=crop&q=80&w=400", question: "Berapa jarak nozzle yang direkomendasikan ke permukaan aplikasi?", options: ["0.3 - 0.5 meter", "0.9 - 1.2 meter (3-4 kaki)", "3 meter", "harus menempel pada permukaan"], correct: 1 },
                { id: 7, title: "PENGGUNAAN VIBRATOR", description: "Pemasangan refractory dengan metode casting.", image: "https://images.unsplash.com/photo-1532187875605-2fe35851142b?auto=format&fit=crop&q=80&w=800", question: "Apa risiko utama jika vibrator digunakan terlalu lama pada castable?", options: ["material menjadi terlalu keras", "terjadi segregasi (pemisahan) semen dan agregat", "warna material memudar", "anchor menjadi bengkok"], correct: 1 },
                { id: 8, title: "SUHU LINGKUNGAN INSTALASI", description: "Pekerjaan instalasi dilakukan di area terbuka.", image: "https://images.unsplash.com/photo-1581094324320-b3e34320b3e3?auto=format&fit=crop&q=80&w=400", question: "Berapa rentang suhu lingkungan yang direkomendasikan untuk instalasi?", options: ["-10°C sampai 0°C", "10°C sampai 32°C", "diatas 50°C", "tidak ada batasan suhu"], correct: 1 },
                { id: 9, title: "PENGUKURAN KETEBALAN", description: "Pemeriksaan ketebalan lining refractory pasca instalasi.", image: "https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?auto=format&fit=crop&q=80&w=400", question: "Bagaimana cara melakukan pengukuran ketebalan yang akurat menurut standar?", options: ["hanya dikira-kira secara visual", "menggunakan probe/jarum ukur yang dikalibrasi", "menunggu material hancur baru diukur", "menggunakan laser infra merah"], correct: 1 },
                { id: 10, title: "POLA PENEMPATAN ANCHOR", description: "Pemasangan anchor sebelum lining.", image: "https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&q=80&w=400", question: "Apa pola penempatan anchor yang paling umum untuk mencegah keretakan lurus?", options: ["pola sejajar sempurna", "pola selang-seling (staggered/offset)", "hanya di sudut-sudut saja", "pola acak tanpa aturan"], correct: 1 }
            ];

            const EXAM_DATABASE = [
                { question: "Menurut API 936, apa tujuan utama dari pembuatan Mock-up Panel?", options: ["menguji warna material", "memvalidasi material, peralatan, dan kualifikasi aplikator", "menghitung sisa material", "formalitas dokumentasi"], correct: 1 },
                { question: "Berapa lama waktu maksimal (holding time) penyimpanan sampel sebelum diuji di lab?", options: ["12 jam", "24 jam", "48 jam", "72 jam"], correct: 1 },
                { question: "Alat apa yang direkomendasikan standar API untuk soundness test di lapangan?", options: ["palu besi 5 kg", "hammer seberat 16-oz", "ultrasonic sensor", "X-ray portable"], correct: 1 },
                { question: "Kriteria kegagalan PLC (Permanent Linear Change) didasarkan pada standar ASTM apa?", options: ["ASTM C133", "ASTM C113", "ASTM C704", "ASTM C20"], correct: 1 },
                { question: "Batas suhu penyimpanan material refractory castable yang direkomendasikan adalah?", options: ["0°C - 10°C", "10°C - 32°C", "35°C - 50°C", "tidak ada batasan"], correct: 1 },
                { question: "Apa konsekuensi utama jika ramp rate suhu pada saat dry-out terlalu cepat?", options: ["perubahan warna", "steam explosion", "material menjadi terlalu kuat", "segregasi semen"], correct: 1 },
                { question: "Berapa persen kekuatan tekan minimum (CCS) sampel mock-up dibanding data sheet?", options: ["50%", "80% - 100%", "120%", "hanya butuh 25%"], correct: 1 },
                { question: "Jenis refractory manakah yang paling cocok digunakan sebagai 'Hot Face' pada area abrasi tinggi?", options: ["insulating castable", "ceramic fiber blanket", "dense low cement castable", "rockwool"], correct: 2 },
                { question: "Fungsi plastic cap pada ujung anchor adalah?", options: ["mencegah karat", "memberi ruang ekspansi termal", "estetika", "mempermudah pengelasan"], correct: 1 },
                { question: "Manakah yang bukan termasuk kriteria inspeksi visual pasca instalasi?", options: ["cracks", "spalling", "void", "harga material"], correct: 3 }
            ];

            const shuffleArray = (array) => {
                let shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            };

            const getFormattedOption = (question, option) => {
                const q = question.trim();
                const lastChar = q.slice(-1);
                const isComplete = lastChar === '?' || lastChar === '.';
                if (isComplete) return option.charAt(0).toUpperCase() + option.slice(1);
                return option.charAt(0).toLowerCase() + option.slice(1);
            };

            const handleStartExam = (count) => {
                const shuffledPool = shuffleArray(EXAM_DATABASE);
                const limit = Math.min(count, shuffledPool.length);
                setActiveExamQuestions(shuffledPool.slice(0, limit));
                setExamSelectionMode(false);
                setExamStarted(true);
            };

            const handleStartSim = () => {
                const shuffledSim = shuffleArray(INSPECTION_DATABASE);
                setActiveSimQuestions(shuffledSim);
                setSimulationStep(0);
                setScore(0);
                setShowResult(false);
            };

            const handleAnswer = (index) => {
                const isCorrect = index === activeSimQuestions[simulationStep].correct;
                const newScore = isCorrect ? score + 1 : score;
                setScore(newScore);
                if (simulationStep + 1 < activeSimQuestions.length) {
                    setSimulationStep(simulationStep + 1);
                } else {
                    setShowResult(true);
                    const currentScorePerc = Math.round((newScore / activeSimQuestions.length) * 100);
                    if(currentScorePerc > bestSimScore) setBestSimScore(currentScorePerc);
                }
            };

            const handleExamAnswer = (index) => {
                const isCorrect = index === activeExamQuestions[currentExamQuestion].correct;
                const newExamScore = isCorrect ? examScore + 1 : examScore;
                setExamScore(newExamScore);
                if (currentExamQuestion + 1 < activeExamQuestions.length) {
                    setCurrentExamQuestion(currentExamQuestion + 1);
                } else {
                    setExamFinished(true);
                    const currentExamPerc = Math.round((newExamScore / activeExamQuestions.length) * 100);
                    if(currentExamPerc > bestExamScore) setBestExamScore(currentExamPerc);
                }
            };

            const handleOpenTheory = (module) => {
                setSelectedModule(module);
                if (!viewedModules.includes(module.id)) {
                    setViewedModules(prev => [...prev, module.id]);
                }
            };

            const resetExam = () => {
                setExamStarted(false);
                setExamSelectionMode(true);
                setCurrentExamQuestion(0);
                setExamScore(0);
                setExamFinished(false);
                setActiveExamQuestions([]);
                setShowCertificate(false);
            };

            const SidebarItem = ({ icon, label, id }) => (
                <button 
                    onClick={() => {
                        setActiveTab(id); 
                        setSelectedModule(null); 
                        setShowCertificate(false);
                        if(id === 'sim') handleStartSim();
                    }}
                    className={`w-full flex items-center space-x-3 px-5 py-3.5 rounded-xl transition-all duration-300 btn-hover group ${
                        activeTab === id ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-100'
                    }`}
                >
                    <LucideIcon 
                        name={icon} 
                        size={18} 
                        className={`flex-shrink-0 ${activeTab === id ? 'text-white' : 'text-slate-500 group-hover:text-slate-900'}`} 
                    />
                    <span className="font-bold text-xs uppercase tracking-wide leading-none text-left whitespace-nowrap">
                        {label === 'Dashboard' ? <span className="foreign">Dashboard</span> : 
                         label === 'Sertifikasi Mock-up' ? <span>Sertifikasi <span className="foreign">Mock-up</span></span> : 
                         label}
                    </span>
                </button>
            );

            const GraduationCertificate = () => {
                const today = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
                const certId = "CERT-" + Math.random().toString(36).substr(2, 6).toUpperCase();
                return (
                    <div id="certificate-print-area" className="w-[842px] h-[595px] bg-white p-2 mx-auto relative overflow-hidden flex flex-col items-center justify-center cert-border text-center shadow-lg">
                        <div className="z-10 w-full px-16 py-10">
                            <div className="flex justify-between items-center mb-8 w-full px-8">
                                <div className="text-left leading-tight">
                                    <div className="text-blue-600 font-black text-xl uppercase tracking-tighter">PGAS</div>
                                    <div className="text-slate-500 font-bold text-[8px] uppercase tracking-[0.2em]">Solution Portal</div>
                                </div>
                                <div className="text-right">
                                    <div className="text-slate-800 font-black text-xs uppercase cinzel tracking-widest">API 936 STANDARDS</div>
                                </div>
                            </div>
                            <h1 className="cinzel text-3xl text-slate-800 mb-1 uppercase font-bold tracking-tight">Sertifikat Kelulusan</h1>
                            <div className="w-32 h-0.5 bg-blue-600 mx-auto mb-8"></div>
                            <p className="text-slate-500 mb-1 uppercase text-[8px] tracking-[0.3em] font-bold">Diberikan Kepada</p>
                            <h2 className="text-3xl font-extrabold text-slate-900 mb-4 uppercase tracking-tight">Peserta Pelatihan PGAS</h2>
                            <p className="text-slate-700 max-w-lg mx-auto text-xs leading-relaxed mb-10">
                                Atas keberhasilannya menyelesaikan program sertifikasi kualifikasi personil <span class="foreign">refractory</span> 
                                sesuai dengan standar internasional <strong>API 936: <span class="foreign">Refractory Installation Quality Control</span>.</strong>
                            </p>
                            <div className="grid grid-cols-3 gap-8 w-full mb-8">
                                <div className="text-left border-t border-slate-300 pt-4">
                                    <div className="text-[8px] text-slate-500 uppercase font-black tracking-widest">Nomor Sertifikat</div>
                                    <div className="text-[10px] font-bold text-slate-800 font-mono mt-0.5">{certId}</div>
                                </div>
                                <div className="text-center">
                                    <div className="w-16 h-16 bg-blue-600 rounded-full mx-auto flex items-center justify-center shadow-md border-2 border-white">
                                        <LucideIcon name="award" className="text-white" size={28} />
                                    </div>
                                    <div className="text-[8px] text-blue-600 font-black mt-2 uppercase tracking-widest leading-none">Official Pass</div>
                                </div>
                                <div className="text-right border-t border-slate-300 pt-4">
                                    <div className="text-[8px] text-slate-500 uppercase font-black tracking-widest">Tanggal Penerbitan</div>
                                    <div className="text-[10px] font-bold text-slate-800 mt-0.5">{today}</div>
                                </div>
                            </div>
                            <div className="flex justify-between items-end w-full px-8 mt-4">
                                <div className="text-center w-40">
                                    <div className="text-lg text-slate-800 font-bold mb-0.5 underline decoration-slate-300 underline-offset-4 font-bold">Authorized Inspector</div>
                                    <div className="text-[8px] font-black uppercase text-slate-900 leading-none tracking-wider mt-2">Inspektur Berwenang</div>
                                </div>
                                <div className="text-center w-40">
                                    <div className="text-lg text-slate-800 font-bold mb-0.5 underline decoration-slate-300 underline-offset-4 font-bold">API 936 Committee</div>
                                    <div className="text-[8px] font-black uppercase text-slate-900 leading-none tracking-wider mt-2">Ketua Pelaksana</div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const theoryProgress = Math.round((viewedModules.length / theoryModules.length) * 100);

            return (
                <div className="min-h-screen flex overflow-hidden">
                    {/* Sidebar - Balanced Width */}
                    <aside className="w-[310px] bg-white border-r border-slate-200 p-8 flex flex-col hidden lg:flex no-print z-20">
                        <div className="flex items-center space-x-3 mb-12 cursor-pointer pl-1" onClick={() => setActiveTab('dashboard')}>
                            <div className="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-100 flex-shrink-0">
                                <LucideIcon name="shield-check" className="text-white" size={22} />
                            </div>
                            <div className="flex flex-col leading-tight">
                                <h1 className="text-xl font-black text-slate-900 tracking-tighter uppercase font-bold">API 936</h1>
                                <span className="text-[8px] text-blue-700 font-extrabold uppercase tracking-[0.3em] mt-1 leading-none font-bold">PGAS Solution</span>
                            </div>
                        </div>

                        <nav className="space-y-2.5 flex-grow">
                            <SidebarItem icon="layout" label="Dashboard" id="dashboard" />
                            <SidebarItem icon="book-open" label="Materi Teori" id="theory" />
                            <SidebarItem icon="play-circle" label="Simulasi Lapangan" id="sim" />
                            <SidebarItem icon="award" label="Sertifikasi Mock-up" id="exam" />
                        </nav>

                        <div className="mt-auto p-6 bg-slate-900 rounded-[24px] text-white shadow-xl">
                            <div className="flex items-center space-x-2 mb-3 text-blue-400">
                                <LucideIcon name="info" size={14} />
                                <span className="text-[9px] font-black uppercase tracking-widest font-bold">Portal v2.8</span>
                            </div>
                            <p className="text-[10px] leading-relaxed text-slate-300 font-bold uppercase tracking-tight">Pahami Standar, Kuasai Lapangan.</p>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className={`flex-1 overflow-y-auto p-8 md:p-12 pb-32 transition-colors duration-500 ${showCertificate ? 'bg-white' : ''}`}>
                        
                        {showCertificate ? (
                            <div className="max-w-3xl mx-auto fade-in">
                                <div className="flex justify-between items-center mb-10 no-print">
                                    <button onClick={() => setShowCertificate(false)} className="flex items-center space-x-2 text-slate-600 font-bold text-xs uppercase hover:text-slate-950 transition-all group">
                                        <LucideIcon name="chevron-left" size={16} className="group-hover:-translate-x-1 transition-transform" /> <span>Kembali</span>
                                    </button>
                                    <button onClick={() => window.print()} className="bg-slate-950 hover:bg-black text-white px-8 py-3.5 rounded-xl font-bold text-xs uppercase shadow-xl flex items-center gap-2 transition-all active:scale-95 font-bold">
                                        <LucideIcon name="printer" size={18} /> Cetak Sertifikat
                                    </button>
                                </div>
                                <GraduationCertificate />
                            </div>
                        ) : (
                            <div className="max-w-5xl mx-auto fade-in">
                                {activeTab === 'dashboard' && (
                                    <div className="fade-in">
                                        <div className="mb-12">
                                            <h2 className="text-4xl font-black text-slate-900 tracking-tighter leading-none mb-3 uppercase font-bold">Pusat Kendali Pelatihan</h2>
                                            <p className="text-slate-600 text-lg font-bold tracking-tight">Monitoring progres belajar personil API 936.</p>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                                            {[
                                                { label: "Thermal Knowledge", prog: theoryProgress, color: "orange", icon: "thermometer", sub: "MODUL DIBACA", tab: "theory" },
                                                { label: "Field Installation", prog: bestSimScore, color: "blue", icon: "zap", sub: "SKOR TERBAIK", tab: "sim" },
                                                { label: "Quality Control", prog: bestExamScore, color: "green", icon: "check-circle", sub: "SKOR UJIAN", tab: "exam" }
                                            ].map((card, i) => (
                                                <div key={i} className="rounded-[32px] p-8 premium-card cursor-pointer group" onClick={() => {
                                                    setActiveTab(card.tab);
                                                    if(card.tab === 'sim') handleStartSim();
                                                }}>
                                                    <div className={`w-12 h-12 bg-${card.color}-100 text-${card.color}-800 rounded-xl flex items-center justify-center mb-8 shadow-inner group-hover:scale-105 transition-transform duration-300`}>
                                                        <LucideIcon name={card.icon} size={24} className={`text-${card.color}-800`} />
                                                    </div>
                                                    <h3 className="text-lg font-black text-slate-900 mb-3 uppercase tracking-tight font-bold">{card.label}</h3>
                                                    <div className="flex justify-between items-center text-[10px] font-black mb-3">
                                                        <span className="text-slate-500 uppercase tracking-widest font-bold">{card.sub}</span>
                                                        <span className={`text-${card.color}-800 font-black`}>{card.prog}%</span>
                                                    </div>
                                                    <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden shadow-inner">
                                                        <div className={`bg-${card.color}-600 h-full transition-all duration-700 ease-out`} style={{ width: `${card.prog}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>

                                        <div className="bg-slate-950 rounded-[40px] p-12 text-white relative overflow-hidden shadow-2xl border border-white/5">
                                            <div className="relative z-10 flex flex-col md:flex-row items-center gap-12">
                                                <div className="flex-1">
                                                    <h3 className="text-3xl font-black mb-6 uppercase tracking-tight font-bold underline decoration-blue-600 underline-offset-8">Ujian <span class="foreign">Mock-Up</span> Panel</h3>
                                                    <p className="text-slate-300 text-lg mb-10 leading-relaxed max-w-xl font-medium">Evaluasi kompetensi teoritis personil sesuai standar internasional API 936 terbaru melalui bank soal acak.</p>
                                                    <button onClick={() => setActiveTab('exam')} className="bg-blue-600 hover:bg-blue-500 px-10 py-4.5 rounded-xl font-black text-xs uppercase shadow-lg shadow-blue-500/20 transition-all flex items-center gap-4 active:scale-95 group tracking-widest font-bold">
                                                        <LucideIcon name="award" size={20} className="group-hover:rotate-12 transition-transform" /> <span>Mulai Sertifikasi</span>
                                                    </button>
                                                </div>
                                                <div className="w-full md:w-64 aspect-square bg-white/5 rounded-[32px] border border-white/10 flex flex-col items-center justify-center backdrop-blur-sm shadow-inner">
                                                    <div className="text-6xl font-black text-blue-400 leading-none uppercase tracking-tighter"><span class="foreign">Rand</span></div>
                                                    <div className="text-[9px] text-blue-300 uppercase font-black tracking-[0.4em] mt-4 leading-none font-bold">Sistem Acak</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {activeTab === 'theory' && (
                                    <div className="fade-in">
                                        {selectedModule ? (
                                            <div className="fade-in max-w-4xl mx-auto">
                                                <button onClick={() => setSelectedModule(null)} className="flex items-center space-x-2 text-slate-500 font-bold mb-10 hover:text-blue-600 transition-all text-xs uppercase tracking-widest group">
                                                    <LucideIcon name="chevron-left" size={16} className="group-hover:-translate-x-1 transition-transform" /> <span>Kembali</span>
                                                </button>
                                                <div className="bg-white rounded-[40px] shadow-xl border border-slate-200 overflow-hidden">
                                                    <div className="h-64 relative">
                                                        <img src={selectedModule.image} className="w-full h-full object-cover brightness-[0.4]" />
                                                        <div className="absolute inset-0 bg-gradient-to-t from-slate-950/80 p-12 flex items-end">
                                                            <h3 className="text-3xl font-black text-white tracking-tight uppercase underline decoration-blue-600 underline-offset-8 font-bold">{selectedModule.title}</h3>
                                                        </div>
                                                    </div>
                                                    <div className="p-12 text-slate-800 leading-relaxed text-lg font-medium" dangerouslySetInnerHTML={{ __html: selectedModule.fullContent }} />
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                <h2 className="text-4xl font-black text-slate-900 mb-12 uppercase tracking-tight font-bold">Pustaka Teknis API 936</h2>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                    {theoryModules.map((item) => (
                                                        <div key={item.id} className="p-10 rounded-[32px] premium-card group cursor-pointer" onClick={() => handleOpenTheory(item)}>
                                                            <div className="w-16 h-16 bg-blue-50 text-blue-700 rounded-2xl flex items-center justify-center mb-10 shadow-inner group-hover:bg-blue-600 group-hover:text-white transition-all">
                                                                <LucideIcon name={item.icon} size={28} className="group-hover:text-white transition-colors" />
                                                            </div>
                                                            <div className="flex justify-between items-start mb-4">
                                                                <h4 className="text-xl font-black text-slate-900 uppercase tracking-tight font-bold">{item.title}</h4>
                                                                {viewedModules.includes(item.id) && (
                                                                    <div className="bg-green-100 text-green-700 p-2 rounded-xl shadow-sm border border-green-200">
                                                                        <LucideIcon name="check-circle" size={20} />
                                                                    </div>
                                                                )}
                                                            </div>
                                                            <p className="text-slate-600 text-base mb-10 font-medium leading-relaxed tracking-tight">{item.shortDesc}</p>
                                                            <div className="flex items-center space-x-3 text-blue-700 font-black text-[10px] uppercase tracking-wider font-bold">
                                                                <span>Pelajari Detail</span> <LucideIcon name="arrow-right" size={14} className="group-hover:translate-x-1.5 transition-transform" />
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'exam' && (
                                    <div className="fade-in max-w-4xl mx-auto">
                                        {examSelectionMode ? (
                                            <div className="bg-white rounded-[48px] shadow-xl p-16 md:p-24 text-center border border-slate-200">
                                                <div className="w-20 h-20 bg-blue-50 text-blue-700 rounded-3xl flex items-center justify-center mx-auto mb-10 shadow-inner border border-blue-100">
                                                    <LucideIcon name="award" size={40} />
                                                </div>
                                                <h2 className="text-3xl font-black text-slate-900 mb-6 uppercase tracking-tight font-bold">Ujian Kualifikasi Personil</h2>
                                                <p className="text-slate-600 mb-16 text-lg font-bold tracking-tight">Pilih jumlah soal untuk memulai ujian acak sesuai standar API 936.</p>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                                    {[10, 20, 50, 100].map(count => (
                                                        <button 
                                                            key={count}
                                                            onClick={() => handleStartExam(count)}
                                                            className="p-8 bg-white hover:bg-blue-600 hover:text-white border-2 border-slate-200 rounded-2xl font-black text-3xl transition-all font-bold active:scale-90 shadow-sm hover:shadow-lg leading-none"
                                                        >
                                                            {count}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : examFinished ? (
                                            <div className="bg-white rounded-[48px] shadow-xl p-20 text-center border-t-[20px] border-blue-600 border-x border-b border-slate-200">
                                                <div className={`w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-10 shadow-lg ${examScore >= (activeExamQuestions.length * 0.7) ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} border-2 border-white`}>
                                                    <LucideIcon name={examScore >= (activeExamQuestions.length * 0.7) ? "award" : "alert-triangle"} size={48} />
                                                </div>
                                                <h2 className="text-3xl font-black text-slate-900 uppercase font-bold">
                                                    {examScore >= (activeExamQuestions.length * 0.7) ? 'Lulus Kualifikasi' : 'Gagal Kualifikasi'}
                                                </h2>
                                                <div className="text-8xl font-black my-12 text-slate-950 leading-none tracking-tighter">{Math.round((examScore / activeExamQuestions.length) * 100)}%</div>
                                                <p className="text-slate-500 text-xs mb-16 font-black uppercase tracking-widest font-bold">Lulus Minimal 70% ({Math.ceil(activeExamQuestions.length * 0.7)}/{activeExamQuestions.length} Soal)</p>
                                                <div className="flex flex-col gap-4 max-w-xs mx-auto">
                                                    {examScore >= (activeExamQuestions.length * 0.7) && (
                                                        <button onClick={() => setShowCertificate(true)} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-5 rounded-xl font-black uppercase shadow-lg shadow-blue-200 flex items-center justify-center gap-4 transition-all active:scale-95 font-bold tracking-widest">
                                                            <LucideIcon name="file-text" size={20} /> <span>Terbitkan Sertifikat</span>
                                                        </button>
                                                    )}
                                                    <button onClick={resetExam} className="w-full bg-slate-900 text-white py-5 rounded-xl font-black uppercase shadow-md hover:bg-black transition-all active:scale-95 font-bold tracking-widest">Ulangi Ujian</button>
                                                    <button onClick={() => setActiveTab('dashboard')} className="w-full bg-white border-2 border-slate-200 text-slate-700 py-5 rounded-xl font-black uppercase transition-all hover:bg-slate-100 hover:text-slate-950 active:scale-95 font-bold tracking-widest">Dashboard</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="bg-white rounded-[40px] shadow-xl border border-slate-200 overflow-hidden">
                                                <div className="bg-slate-200 h-3 w-full shadow-inner">
                                                    <div className="bg-blue-600 h-full transition-all duration-700 ease-out shadow-sm" style={{width: `${((currentExamQuestion + 1) / activeExamQuestions.length) * 100}%`}}></div>
                                                </div>
                                                <div className="p-12 md:p-20">
                                                    <div className="flex justify-between items-center mb-16">
                                                        <span className="px-5 py-2.5 bg-blue-100 text-blue-800 text-[10px] font-black uppercase rounded-xl border border-blue-200 shadow-sm font-bold tracking-widest uppercase">Ujian <span class="foreign">Mock-Up</span></span>
                                                        <span className="text-[10px] font-black text-slate-400 font-mono tracking-widest uppercase font-bold">Soal {currentExamQuestion + 1} / {activeExamQuestions.length}</span>
                                                    </div>
                                                    <h3 className="text-2xl font-bold text-slate-900 mb-16 leading-relaxed tracking-tight underline decoration-blue-100 decoration-4 underline-offset-8">
                                                        {activeExamQuestions[currentExamQuestion].question}
                                                    </h3>
                                                    <div className="space-y-4">
                                                        {activeExamQuestions[currentExamQuestion].options.map((option, idx) => (
                                                            <button key={idx} onClick={() => handleExamAnswer(idx)} className="w-full text-left p-6 rounded-2xl border-2 border-slate-100 hover:border-blue-600 hover:bg-blue-50 transition-all flex items-center group shadow-sm active:scale-[0.99]">
                                                                <div className="w-10 h-10 rounded-xl bg-slate-100 text-slate-500 flex items-center justify-center font-black text-sm mr-8 group-hover:bg-blue-600 group-hover:text-white transition-all shadow-inner border border-slate-200 font-bold uppercase">
                                                                    {String.fromCharCode(65 + idx)}
                                                                </div>
                                                                <span className="text-slate-800 font-bold text-lg group-hover:text-blue-900 transition-colors tracking-tight">
                                                                    {getFormattedOption(activeExamQuestions[currentExamQuestion].question, option)}
                                                                </span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {activeTab === 'sim' && (
                                    <div className="fade-in max-w-5xl mx-auto">
                                        {!showResult ? (
                                            <div className="bg-white rounded-[40px] shadow-xl border border-slate-200 overflow-hidden">
                                                <div className="bg-slate-950 p-10 text-white flex justify-between items-center">
                                                    <div className="flex items-center space-x-6">
                                                        <div className="w-3.5 h-3.5 rounded-full bg-red-600 animate-pulse shadow-[0_0_15px_rgba(220,38,38,0.7)]"></div>
                                                        <h3 className="text-2xl font-black uppercase tracking-tight font-bold leading-none">Skenario Lapangan {simulationStep + 1}</h3>
                                                    </div>
                                                    <div className="bg-white/10 px-6 py-2.5 rounded-xl text-[10px] font-black text-blue-300 border border-white/10 tracking-widest font-bold uppercase leading-none">
                                                        Akurasi: {score}/{activeSimQuestions.length}
                                                    </div>
                                                </div>
                                                <div className="p-12 md:p-16">
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-16">
                                                        <div className="space-y-8">
                                                            <div className="group relative overflow-hidden rounded-[32px] border-[12px] border-slate-100 shadow-xl bg-slate-100">
                                                                <img src={activeSimQuestions[simulationStep].image} className="w-full aspect-square object-cover group-hover:scale-105 transition-all duration-700" />
                                                                <div className="absolute inset-0 bg-gradient-to-t from-slate-950/70 to-transparent"></div>
                                                            </div>
                                                            <div className="p-8 bg-blue-100/30 rounded-[32px] text-lg text-blue-950 border-l-[10px] border-blue-600 font-bold leading-relaxed shadow-sm">
                                                                {activeSimQuestions[simulationStep].description}
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col justify-center">
                                                            <h4 className="text-2xl font-bold text-slate-900 mb-12 leading-snug underline decoration-blue-500/10 decoration-4 underline-offset-8 tracking-tight font-bold">
                                                                {activeSimQuestions[simulationStep].question}
                                                            </h4>
                                                            <div className="space-y-4 flex-grow">
                                                                {activeSimQuestions[simulationStep].options.map((opt, i) => (
                                                                    <button key={i} onClick={() => handleAnswer(i)} className="w-full text-left p-6 rounded-2xl border-2 border-slate-100 hover:border-blue-600 hover:bg-blue-50 transition-all flex items-center justify-between group shadow-sm active:scale-[0.99]">
                                                                        <span className="font-bold text-slate-800 group-hover:text-blue-900 text-lg tracking-tight font-bold leading-tight">{getFormattedOption(activeSimQuestions[simulationStep].question, opt)}</span>
                                                                        <LucideIcon name="chevron-right" size={24} className="text-slate-300 group-hover:text-blue-600 group-hover:translate-x-2 transition-all" />
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="bg-white rounded-[40px] shadow-xl p-20 text-center max-w-2xl mx-auto border-b-[20px] border-blue-600 border-x border-slate-200">
                                                <div className="w-24 h-24 bg-green-100 text-green-800 rounded-3xl flex items-center justify-center mx-auto mb-12 shadow-inner border border-green-200">
                                                    <LucideIcon name="check-circle" size={48} />
                                                </div>
                                                <h2 className="text-3xl font-black text-slate-900 mb-4 uppercase tracking-tight font-bold">Misi Lapangan Selesai</h2>
                                                <div className="text-8xl font-black text-blue-600 my-12 tracking-tighter leading-none">{Math.round((score/activeSimQuestions.length)*100)}%</div>
                                                <div className="space-y-6">
                                                    <button onClick={() => handleStartSim()} className="w-full bg-slate-950 text-white py-6 rounded-2xl font-black uppercase shadow-xl transition-all font-bold active:scale-95 tracking-widest leading-none text-base">Ulangi Skenario (<span class="foreign">Random</span>)</button>
                                                    <button onClick={() => setActiveTab('dashboard')} className="w-full text-slate-500 text-[10px] font-black uppercase hover:text-slate-950 transition-colors tracking-widest font-bold leading-none mt-4">Kembali Ke Dashboard</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Mobile Navigation */}
                    <nav className="lg:hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-white px-10 py-7 rounded-[40px] shadow-2xl border border-slate-200 flex space-x-14 z-50 no-print">
                        <button onClick={() => setActiveTab('dashboard')} className={activeTab === 'dashboard' ? 'text-blue-600 scale-110' : 'text-slate-400'}>
                            <LucideIcon name="layout" size={24} />
                        </button>
                        <button onClick={() => {setActiveTab('theory'); setSelectedModule(null);}} className={activeTab === 'theory' ? 'text-blue-600 scale-110' : 'text-slate-400'}>
                            <LucideIcon name="book-open" size={24} />
                        </button>
                        <button onClick={() => handleStartSim() + setActiveTab('sim')} className={activeTab === 'sim' ? 'text-blue-600 scale-110' : 'text-slate-400'}>
                            <LucideIcon name="play-circle" size={24} />
                        </button>
                        <button onClick={() => setActiveTab('exam')} className={activeTab === 'exam' ? 'text-blue-600 scale-110' : 'text-slate-400'}>
                            <LucideIcon name="award" size={24} />
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
